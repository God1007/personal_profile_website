server {
    listen 80;
    listen [::]:80;
    server_name jared01home.com www.jared01home.com;

    root /var/www/personal-profile-site;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
